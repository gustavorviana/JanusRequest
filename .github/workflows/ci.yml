name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test JanusRequest.Tests
        if: matrix.os == 'ubuntu-latest'
        run: dotnet test JanusRequest.Tests --no-build

      - name: Test JanusRequest.Extensions.DependencyInjection.Tests
        if: matrix.os == 'ubuntu-latest'
        run: dotnet test JanusRequest.Extensions.DependencyInjection.Tests --no-build

      - name: Test JanusRequest.Net462.Tests
        if: matrix.os == 'windows-latest'
        run: dotnet test JanusRequest.Net462.Tests --no-build
